name: Build and Test Flexor
on: 
  workflow_dispatch:
  release:
    types: [ created, published ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup PowerShell
      uses: PSModule/install-powershell@v1
      
    #- name: Install Pester
    #  run: Install-Module -Name Pester -Force -SkipPublisherCheck
    #  shell: pwsh

    - name: Build Flexor
      run: |
        ./build.ps1
      shell: pwsh

    # Until I can figure out why Actions is killing pwsh and python processes  
    #- name: Run Tests
    #  run: |
    #    ./test.ps1 -Run;
    #    Remove-Item .bicep/flexor/logs -Recurse -Force -ErrorAction SilentlyContinue;
    #  shell: pwsh
  
    - name: Zip Artifacts
      run: |
        zip -r flexor.zip bicepconfig.json .bicep 
      shell: bash
    
    - name: Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: '*.zip'
        token: ${{ secrets.TOKEN }}